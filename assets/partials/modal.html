<div id="modal" class="modal" style="display:none;position:fixed;z-index:99999;top:0;left:0;width:100vw;height:100vh;background:rgba(16,24,32,0.92);align-items:center;justify-content:center;">
  <div class="modal-content" style="background:#181c24;padding:2em 1.5em;border-radius:var(--border-radius,8px);max-width:400px;width:90vw;box-shadow:0 0 24px #00fff055;">
    <span id="modal-close" style="float:right;font-size:1.5em;cursor:pointer;color:#00fff0;">&times;</span>
    <div id="modal-body">Contenu du modal</div>
  </div>
</div>
<!-- Réutilisable : injectez ce partiel où besoin -->
