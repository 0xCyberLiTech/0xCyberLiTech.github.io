<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0xCyberLiTech - Initialisation...</title>
    <link rel="icon" href="assets/logo.png" type="image/png">
    <link rel="stylesheet" href="assets/preloader.css">
</head>
<body>
    <canvas id="matrix-preloader"></canvas>
    <div class="preloader-container">
        <div class="terminal-window">
            <div class="terminal-header">
                <div class="terminal-buttons">
                    <span class="btn-close"></span>
                    <span class="btn-minimize"></span>
                    <span class="btn-maximize"></span>
                </div>
                <div class="terminal-title">┌──(0xCyberLiTech㉿kali)-[~/portfolio]</div>
            </div>
            <div class="terminal-content">
                <div class="logo-section">
                    <div class="logo-container">
                        <img src="assets/logo.png" alt="0xCyberLiTech Logo" class="preloader-logo">
                        <div class="logo-scanlines"></div>
                        <div class="logo-glow"></div>
                    </div>
                    <h1 class="brand-name">0xCyberLiTech</h1>
                    <p class="brand-subtitle">Cybersecurity • Linux • AI • Digital Audio</p>
                </div>
                <div class="loading-section">
                    <div class="terminal-prompt">
                        <span class="prompt-symbol">└─$</span>
                        <span class="typing-text" id="typing-text"></span>
                        <span class="cursor">_</span>
                    </div>
                    <div class="progress-container">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progress-fill"></div>
                            <div class="progress-glow"></div>
                        </div>
                        <div class="progress-text">
                            <span id="progress-percent">0</span>% 
                            <span class="loading-dots">Loading</span>
                        </div>
                    </div>
                    <div class="status-messages" id="status-messages">
                        <div class="status-line">► Initializing Matrix protocols...</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="matrix-overlay"></div>
    </div>
    <script src="assets/preloader.js"></script>
</body>
</html>
