<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>0xCyberLiTech - Portfolio GitHub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="assets/style.css">
    <script defer src="assets/script.js"></script>
</head>
<body>
    <!-- PRELOADER ULTRA-MODERNE -->
    <div id="preloader-ultramodern" class="preloader-ultramodern">
        <canvas id="preloader-canvas"></canvas>
        <div class="preloader-content">
            <div class="preloader-logo-container">
                <img src="assets/logo.png" alt="Logo 0xCyberLiTech" class="preloader-logo">
            </div>
            <div class="preloader-status">
                <div class="preloader-status-text" id="preloader-status-text">Initialisation du portfolio...</div>
                <div class="preloader-progress-bar-container">
                    <div class="preloader-progress-bar-bg">
                        <div class="preloader-progress-bar" id="preloader-progress-bar"></div>
                        <div class="preloader-progress-bar-marks">
                            <span>0%</span>
                            <span>50%</span>
                            <span>100%</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="portfolio-root" style="opacity:0;pointer-events:none;transition:opacity 0.8s cubic-bezier(0.4,0,0.2,1);">
        <header class="top-banner">
            <div class="top-banner__content">
                <span class="top-banner__title">&gt;Portfolio 0xCyberLiTech<span class="terminal-cursor">_</span></span>
                <div class="top-banner__prompt">
                    <span class="top-banner__prompt-inner">
                        echo "Welcome to my cybersecurity portfolio"
                    </span>
                </div>
            </div>
        </header>
        <main>
            <section id="projets">
                <h2 class="tron-section-title">$ ls -la ~/repositories/public</h2>
                <div class="search-terminal">
                    <span class="search-prompt">└─$</span>
                    <span class="search-icon" aria-hidden="true">
                        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="10" cy="10" r="7.5" stroke="#00fff0" stroke-width="2"/>
                            <line x1="16.1213" y1="16.1213" x2="20" y2="20" stroke="#00fff0" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </span>
                    <input id="search-repos" type="search" placeholder="Recherche..." autocomplete="off">
                </div>
                <div id="projects-list"></div>
            </section>
        </main>
    <footer id="site-footer" style="width:100vw;left:0;right:0;position:relative;margin:2.5em 0 0 0;padding:0.7em 0 0.5em 0;text-align:center;font-size:0.98em;color:#00fff0cc;background:rgba(10,20,30,0.82);border-top:1.5px solid #00fff055;box-shadow:0 0 16px #00fff022 inset,0 1px 0 #00fff033;backdrop-filter:blur(2px);border-radius:0;">
            &copy; 2025 0xCyberLiTech. Tous droits réservés.
        </footer>
    </div>

    <link rel="stylesheet" href="assets/preloader-ultramodern.css">
    <script src="assets/preloader-ultramodern.js"></script>
    <script>
    // Transition JS : fade-out du preloader, fade-in du portfolio (après la barre de progression)
    window.addEventListener('preloader:done', function() {
        const status = document.getElementById('preloader-status-text');
        status.textContent = 'Bienvenue !';
        setTimeout(() => {
            const preloader = document.getElementById('preloader-ultramodern');
            preloader.style.opacity = '0';
            preloader.style.pointerEvents = 'none';
            const root = document.getElementById('portfolio-root');
            root.style.opacity = '1';
            root.style.pointerEvents = 'auto';
            setTimeout(() => {
                if (preloader && preloader.parentNode) {
                    preloader.parentNode.removeChild(preloader);
                }
            }, 700);
        }, 900);
    });
    </script>
    <script src="assets/tron-numbers-bg.js"></script>
</body>
</html>
